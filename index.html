<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Wakaf RM1 - Muhammad Aiman</title>
    <meta property="og:title" content="Wakaf RM1 - Muhammad Aiman">
    <meta property="og:description" content="Imbas kod DuitNow untuk sumbangan pantas.">
    <meta property="og:image" content="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=00020201021126690014A000000615000101065887340220MAEPP111144274942524031317039294010545204000053034585802MY5925MUHAMMAD&color=3E2723&bgcolor=F5F5DC">
    <meta property="og:type" content="website">

    <style>
        /* Base Styling */
        body {
            background-color: #F5F5DC; /* Beige Coffee */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .payment-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 35px;
            box-shadow: 0 20px 40px rgba(62, 39, 35, 0.08);
            text-align: center;
            max-width: 350px;
            border: 1px solid rgba(62, 39, 35, 0.05);
        }

        /* Container untuk Logo & QR */
        .qr-container {
            position: relative;
            background: #F5F5DC; 
            padding: 25px;
            border-radius: 25px;
            display: inline-block;
            margin-top: 10px;
        }

        /* Duitnow SVG Position */
        .duitnow-logo {
            width: 100px; /* Saiz logo DuitNow yang lebih jelas */
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .qr-image {
            display: block;
            border-radius: 12px;
            border: 4px solid #3E2723; /* Frame Coklat Gelap */
        }

        .name-tag {
            margin-top: 25px;
            color: #3E2723;
            font-weight: 600;
            letter-spacing: 0.5px;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        .sub-text {
            color: #6D4C41;
            font-size: 0.85rem;
            margin-top: 5px;
            opacity: 0.8;
        }

        .footer-note {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #A1887F;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="payment-card">
    <img src="duitnow.svg" class="duitnow-logo" alt="DuitNow">

    <div class="qr-container">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=00020201021126690014A000000615000101065887340220MAEPP111144274942524031317039294010545204000053034585802MY5925MUHAMMAD&color=3E2723&bgcolor=F5F5DC" class="qr-image" alt="DuitNow QR">
    </div>

    <div class="name-tag">Muhammad Aiman</div>
    <div class="sub-text">Sumbangan Wakaf RM1.00</div>
    
    <div class="footer-note">
        Sila <b>screenshot</b> halaman ini dan imbas menggunakan aplikasi MAE, TNG eWallet, atau aplikasi perbankan anda.
    </div>
</div>

</body>
</html>
